# Weed Detection Dataset -- DeepWeeds + Plant Seedlings V2 Combined
# Auto-generated by prepare_dataset.py  (AFRS Paper §2.2)
#
# Total classes: 17
#
# Class taxonomy:
#   IDs  0-7  : Weed species from DeepWeeds dataset (Alex Olsen et al., 2019)
#               8 invasive weed species from tropical/sub-tropical Australia.
#
#   IDs  8-14 : Weed species from Plant Seedlings V2 (Giselsson et al.)
#               NOTE -- Plant Seedlings uses DIFFERENT species names from DeepWeeds.
#               Mapping applied in prepare_dataset.py:
#                 'Black-grass'               -> class  8
#                 'Charlock'                  -> class  9
#                 'Cleavers'                  -> class 10
#                 'Fat Hen'                   -> class 11
#                 'Loose Silky-bent'          -> class 12
#                 'Scentless Mayweed'         -> class 13
#                 'Shepherd''s Purse' /
#                 'Small-flowered Cranesbill' -> class 14
#
#   ID  15    : crop -- merged from:
#                 DeepWeeds class 8 ('Negative', i.e. non-weed background)
#                 Plant Seedlings crops: Common Chickweed, Common wheat,
#                                        Maize, Sugar beet
#               Crop detections are EXCLUDED from the weed heatmap H(i,j).
#
#   ID  16    : background -- noise / non-object regions
#
# Downstream rules:
#   Only class IDs 0-14 (weed) with confidence > tau_c (=0.5) are passed to
#   the heatmap and sprayer nodes (paper sections 3.3, 3.4, 3.6).

path: D:/Weed Detection/dataset/yolo_combined
train: images/train
val:   images/val
test:  images/test

# Number of classes
nc: 17

# Class names -- first 15 are weed species (IDs 0-14),
# index 15 = crop, index 16 = background
names:
  0:  Chinee_apple
  1:  Lantana
  2:  Parkinsonia
  3:  Parthenium
  4:  Prickly_acacia
  5:  Rubber_vine
  6:  Siam_weed
  7:  Snake_weed
  8:  Black-grass
  9:  Charlock
  10: Cleavers
  11: Fat_Hen
  12: Loose_Silky-bent
  13: Scentless_Mayweed
  14: Shepherds_Purse
  15: crop
  16: background
